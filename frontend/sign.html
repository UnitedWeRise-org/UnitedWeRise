<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Petition - United We Rise</title>
    <meta name="description" content="Sign this petition on United We Rise">
    <!-- Open Graph tags for social sharing -->
    <meta property="og:title" content="Sign Petition - United We Rise">
    <meta property="og:description" content="Sign this petition on United We Rise">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="United We Rise">
    <!-- hCaptcha -->
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <!-- Petition styles -->
    <link rel="stylesheet" href="src/styles/petition.css">
    <style>
        /* Critical inline styles for initial load */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
        }
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 2rem;
        }
        .loading-spinner .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid #4b5c09;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-spinner p {
            margin-top: 1rem;
            color: #6b7280;
            font-size: 0.95rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="petition-app">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading petition...</p>
        </div>
    </div>
    <div id="toast-container"></div>
    <script type="module" src="src/modules/features/petitions/sign-petition.js"></script>
</body>
</html>
